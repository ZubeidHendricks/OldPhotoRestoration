# Generated by AppFactoryKit appgen. Run: xcodegen generate
name: OldPhotoRestoration
options:
  bundleIdPrefix: com.zubeid
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  AppFactoryKit:
    url: https://github.com/ZubeidHendricks/AppFactoryKit
    from: "0.1.0"

targets:
  OldPhotoRestoration:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources
    dependencies:
      - package: AppFactoryKit
        product: AppFactoryKit
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: "Photo Restore"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSCameraUsageDescription: "OldPhotoRestoration uses the camera to capture and process your content."
        NSPhotoLibraryUsageDescription: "OldPhotoRestoration needs access to your photos to import and process images."
        NSPhotoLibraryAddUsageDescription: "OldPhotoRestoration saves your results to your photo library."
    settings:
      base:
        PRODUCT_NAME: OldPhotoRestoration
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.oldphotorestore
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  OldPhotoRestorationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - path: Sources/RestoreService.swift
    settings:
      base:
        PRODUCT_NAME: OldPhotoRestorationTests
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.oldphotorestoration.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"

schemes:
  Tests:
    build:
      targets:
        OldPhotoRestorationTests: [test]
    test:
      targets:
        - OldPhotoRestorationTests
